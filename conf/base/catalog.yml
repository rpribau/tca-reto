# =========================================================
# Raw input tables
# =========================================================
# These are the original hospital tables provided by TCA.
# They must be placed locally in data/01_raw/.
# Raw data files are ignored by Git and must not be committed.

hospac:
  type: pandas.ParquetDataSet
  filepath: data/01_raw/hospac.parquet

hosagd:
  type: pandas.ParquetDataSet
  filepath: data/01_raw/hosagd.parquet

hosmpi:
  type: pandas.ParquetDataSet
  filepath: data/01_raw/hosmpi.parquet

notamedicaurg:
  type: pandas.ParquetDataSet
  filepath: data/01_raw/notamedicaurg.parquet

triage:
  type: pandas.ParquetDataSet
  filepath: data/01_raw/triage.parquet

# =========================================================
# Intermediate cleaned tables
# =========================================================
# Outputs generated by the Data Engineering cleaning nodes.
# These tables are cleaned versions of the raw inputs and are stored locally
# in data/02_intermediate/.

processed_hospac:
  type: pandas.ParquetDataSet
  filepath: data/02_intermediate/processed_hospac.parquet

processed_hosagd:
  type: pandas.ParquetDataSet
  filepath: data/02_intermediate/processed_hosagd.parquet

processed_hosmpi:
  type: pandas.ParquetDataSet
  filepath: data/02_intermediate/processed_hosmpi.parquet

processed_triage:
  type: pandas.ParquetDataSet
  filepath: data/02_intermediate/processed_triage.parquet

processed_notamedicaurg:
  type: pandas.ParquetDataSet
  filepath: data/02_intermediate/processed_notamedicaurg.parquet

# =========================================================
# Primary modeling datasets
# =========================================================
# Final base datasets created by the Data Engineering pipeline.
# These are the datasets consumed by the Data Science pipelines.

preprocessed_data_his10:
  # Base dataset for HIS-10 No-Show Guard.
  # One row per appointment with known attendance label.
  type: pandas.ParquetDataSet
  filepath: data/03_primary/preprocessed_data_his10.parquet

master_table_his05:
  # Base dataset for HIS-05 saturation / wait-time forecasting.
  # One row per hour with demand, wait-time proxy, and triage features.
  type: pandas.ParquetDataSet
  filepath: data/03_primary/master_table_his05.parquet

# =========================================================
# Trained model artifacts
# =========================================================
# These files are expected to be generated later by the Data Science pipelines.
# They are not created by the Data Engineering pipeline.

trained_model_his05:
  type: pickle.PickleDataSet
  filepath: data/06_models/trained_model_his05.pkl

trained_model_his10:
  type: pickle.PickleDataSet
  filepath: data/06_models/trained_model_his10.pkl

# =========================================================
# Model evaluation metrics
# =========================================================
# Metrics generated later by the Data Science pipelines and stored as JSON.

evaluation_metrics_his05:
  type: json.JSONDataSet
  filepath: data/09_tracking/evaluation_metrics_his05.json

evaluation_metrics_his10:
  type: json.JSONDataSet
  filepath: data/09_tracking/evaluation_metrics_his10.json
